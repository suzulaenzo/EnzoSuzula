<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Portfólio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-animation"></div>
  <main class="container">
    <!-- Espaço para a foto -->
    <div class="profile-image">
      <!-- Substituir 'sua-foto.jpg' pela imagem desejada -->
      <img src="sua-foto.jpg" alt="Minha Foto" />
    </div>

    <!-- Nome, link e competências -->
    <div class="info">
      <h1>Enzo Suzula</h1>
      <p><a href="https://www.linkedin.com/in/seu-perfil" target="_blank">LinkedIn</a></p>
      <p class="bio">
        Desenvolvedor com experiência em criação de soluções web responsivas e performáticas. Foco em código limpo, criatividade e performance. Especializado em HTML, CSS, C++, e JavaScript.
      </p>

      <!-- Logos das competências -->
      <div class="skills">
        <!-- HTML -->
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML" />

<!-- CSS -->
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg" alt="CSS" />

<!-- C++ -->
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg" alt="C++" />

<!-- JavaScript -->
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript" />

      </div>
    </div>
  </main>
</body>
</html>
